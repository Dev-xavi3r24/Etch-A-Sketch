<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch a Sketch</title>
    <link rel="stylesheet" href="./styles.css">

</head>
<body>
    <main class="app">
        <section class="controls">
            <div class="title-group">
                <h1>Etch a Sketch</h1>
                <p>Paint each square brighter first, then darker with every pass. Have fun</p>
            </div>
            <div class="button-group">
                <button id="gridSizeBtn">New Grid</button>
                <button id="resetGridBtn">Reset Grid</button>
            </div>
            <div class="hover-counter">
                <span>Hover count</span>
                <strong id="hoverSquareTimes">0</strong>
            </div>
        </section>
        <div id="container"></div>
    </main>
    <script src="./app.js"></script>
</body>
</html>
